
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-cryptopulse}:${POSTGRES_PASSWORD:-cryptopulse_secret}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd12I=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-cryptopulse_web_secret}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/airflow/dags
    # CryptoPulse DB connection
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB:-cryptopulse}
    POSTGRES_USER: ${POSTGRES_USER:-cryptopulse}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopulse_secret}
    COINGECKO_BASE_URL: ${COINGECKO_BASE_URL:-https://api.coingecko.com/api/v3}
    BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com/api/v3}
    FEAR_GREED_BASE_URL: ${FEAR_GREED_BASE_URL:-https://api.alternative.me}
    API_TIMEOUT: ${API_TIMEOUT:-30}
    API_MAX_RETRIES: ${API_MAX_RETRIES:-3}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./etl:/opt/airflow/etl
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cryptopulse_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptopulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptopulse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cryptopulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema/01_raw.sql:/docker-entrypoint-initdb.d/01_raw.sql
      - ./database/schema/02_processed.sql:/docker-entrypoint-initdb.d/02_processed.sql
      - ./database/schema/03_analytics.sql:/docker-entrypoint-initdb.d/03_analytics.sql
      - ./database/schema/04_logs.sql:/docker-entrypoint-initdb.d/04_logs.sql
      - ./database/views/views.sql:/docker-entrypoint-initdb.d/05_views.sql
      - ./database/procedures/procedures.sql:/docker-entrypoint-initdb.d/06_procedures.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptopulse} -d ${POSTGRES_DB:-cryptopulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow database init (runs once) ─────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: cryptopulse_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Create separate Airflow metadata DB
        until pg_isready -h postgres -U ${POSTGRES_USER:-cryptopulse}; do sleep 2; done
        # Create airflow database if not exists
        PGPASSWORD=${POSTGRES_PASSWORD:-cryptopulse_secret} psql \
          -h postgres -U ${POSTGRES_USER:-cryptopulse} -d ${POSTGRES_DB:-cryptopulse} \
          -c "SELECT 1 FROM pg_database WHERE datname='airflow'" | grep -q 1 || \
          PGPASSWORD=${POSTGRES_PASSWORD:-cryptopulse_secret} psql \
          -h postgres -U ${POSTGRES_USER:-cryptopulse} -d ${POSTGRES_DB:-cryptopulse} \
          -c "CREATE DATABASE airflow"
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname CryptoPulse \
          --lastname Admin \
          --role Admin \
          --email admin@cryptopulse.local \
          --password admin123 || true
    restart: "no"

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: cryptopulse_scheduler
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # ── Airflow Webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: cryptopulse_webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
